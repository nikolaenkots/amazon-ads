<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Портфолио · Amazon Ads</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f4f4f6;--surface:#fff;--surface2:#f0f0f3;--border:#e2e2e8;--border2:#ccccd4;
  --text:#18181c;--muted:#6b6b7a;--dim:#aaaab8;
  --accent:#c84b14;--accent-bg:rgba(200,75,20,.07);--accent-bd:rgba(200,75,20,.22);
  --green:#1a8f5c;--green-bg:rgba(26,143,92,.08);--green-bd:rgba(26,143,92,.2);
  --red:#d94040;--red-bg:rgba(217,64,64,.07);--red-bd:rgba(217,64,64,.22);
  --blue:#1a6fd4;--blue-bg:rgba(26,111,212,.07);--blue-bd:rgba(26,111,212,.2);
  --amber:#b07800;--amber-bg:rgba(176,120,0,.07);--amber-bd:rgba(176,120,0,.22);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh}

/* Header */
header{display:flex;align-items:center;justify-content:space-between;padding:0 32px;height:52px;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:200;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.logo{display:flex;align-items:center;gap:10px;font-size:13px;font-weight:600}
.logo-dot{width:26px;height:26px;border-radius:7px;background:var(--accent);display:flex;align-items:center;justify-content:center}
nav{display:flex;gap:2px}
nav a{padding:5px 12px;border-radius:6px;font-size:13px;font-weight:500;color:var(--muted);text-decoration:none;transition:color .15s,background .15s}
nav a:hover{color:var(--text);background:var(--surface2)}
nav a.active{color:var(--accent);background:var(--accent-bg)}

/* Layout */
main{padding:18px 32px;max-width:1400px;margin:0 auto}

/* Buttons */
.btn{height:34px;padding:0 14px;border-radius:6px;border:none;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:all .15s;white-space:nowrap}
.btn:disabled{opacity:.45;cursor:not-allowed}
.btn-p{background:var(--accent);color:#fff}.btn-p:hover:not(:disabled){background:#a83d10}
.btn-s{background:var(--surface);color:var(--text);border:1px solid var(--border)}.btn-s:hover:not(:disabled){background:var(--surface2)}
.btn-g{background:var(--green);color:#fff}.btn-g:hover:not(:disabled){background:#157a4d}

/* Actions panel */
.ap{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 18px;margin-bottom:14px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.ap-title{font-size:13px;font-weight:600;margin-bottom:3px}
.ap-desc{font-size:12px;color:var(--muted);margin-bottom:12px;line-height:1.5}
.ap-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.info{padding:9px 13px;border-radius:7px;font-size:12px;font-family:'DM Mono',monospace;margin-top:10px;display:none}
.info.on{display:block}
.info.ok{background:var(--green-bg);border:1px solid var(--green-bd);color:var(--green)}
.info.err{background:var(--red-bg);border:1px solid var(--red-bd);color:var(--red)}
.info.inf{background:var(--blue-bg);border:1px solid var(--blue-bd);color:var(--blue)}

/* Table wrap */
.tw{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.thr{display:flex;align-items:center;justify-content:space-between;padding:11px 16px;border-bottom:1px solid var(--border)}
.tt{font-size:14px;font-weight:600}
.tc{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted)}

/* Filter bar */
.fb{display:flex;align-items:center;gap:6px;padding:9px 14px;border-bottom:1px solid var(--border);background:var(--surface2);flex-wrap:wrap}
.fl{font-size:10px;font-family:'DM Mono',monospace;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;white-space:nowrap}
.fb-btn{font-size:11px;font-family:'DM Mono',monospace;padding:3px 10px;border-radius:5px;border:1px solid var(--border);background:var(--surface);color:var(--muted);cursor:pointer;transition:all .15s}
.fb-btn:hover{background:var(--surface2)}
.fb-btn.on{background:var(--accent-bg);border-color:var(--accent-bd);color:var(--accent)}
.fb-sep{width:1px;height:16px;background:var(--border);flex-shrink:0}
.fb-search{font-size:12px;font-family:'DM Mono',monospace;padding:4px 10px;border-radius:6px;border:1px solid var(--border);background:var(--surface);color:var(--text);outline:none;width:200px;margin-left:auto}
.fb-search:focus{border-color:var(--accent)}

/* Table */
.tsx{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{text-align:left;padding:7px 14px;font-family:'DM Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);background:var(--surface2);border-bottom:1px solid var(--border);white-space:nowrap}
tbody tr{border-bottom:1px solid var(--border);transition:background .1s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:#fafafa}
tbody tr.mod{background:rgba(26,111,212,.03)}
tbody tr.mod:hover{background:rgba(26,111,212,.06)}
td{padding:7px 14px;vertical-align:middle}

/* Editable */
.ec input{width:100%;background:transparent;border:none;font-family:'DM Mono',monospace;font-size:12px;color:var(--text);padding:0;outline:none;min-width:120px}
.ec input:focus{background:var(--blue-bg);border-radius:4px;padding:2px 6px;margin:-2px -6px}
.ec input.ch{color:var(--blue);font-weight:500}

/* Badges */
.b{display:inline-block;padding:1px 7px;border-radius:4px;font-size:10px;font-family:'DM Mono',monospace;font-weight:500;border:1px solid}
.bm{background:var(--accent-bg);color:var(--accent);border-color:var(--accent-bd)}
.bk{background:var(--blue-bg);color:var(--blue);border-color:var(--blue-bd)}
.bus{background:var(--green-bg);color:var(--green);border-color:var(--green-bd)}
.bmkt{background:var(--surface2);color:var(--muted);border-color:var(--border)}

/* Footer */
.tf{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-top:1px solid var(--border);background:var(--surface2)}
.tf-l{font-size:11px;font-family:'DM Mono',monospace;color:var(--dim)}
.chg-badge{font-size:11px;font-family:'DM Mono',monospace;padding:2px 9px;border-radius:5px;background:var(--blue-bg);border:1px solid var(--blue-bd);color:var(--blue);display:none}
.chg-badge.on{display:inline-block}

/* Save row */
.save-row{display:flex;align-items:center;justify-content:flex-end;gap:8px;padding:14px 0}

/* Empty / spinner */
.te{padding:48px;text-align:center;color:var(--muted);font-size:13px}
.sp{display:inline-block;width:13px;height:13px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite}
.sp-dark{border-color:var(--border);border-top-color:var(--accent)}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-dot">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/></svg>
    </div>
    Amazon Ads Automation
  </div>
  <nav>
    <a href="/">Главная</a>
    <a href="/analytics/campaigns">Кампании</a>
    <a href="/analytics/products">Продукты</a>
    <a href="/control">Контроль</a>
    <a href="/portfolios" class="active">Портфолио</a>
  </nav>
</header>

<main>

  <!-- Actions panel -->
  <div class="ap">
    <div class="ap-title">Управление портфолио</div>
    <div class="ap-desc">Сканирует таблицы кампаний и добавляет новые портфолио. Существующие имена не затрагиваются.</div>
    <div class="ap-row">
      <button class="btn btn-p" id="syncBtn" onclick="syncPortfolios()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/></svg>
        Обновить список
      </button>
      <label class="btn btn-s" style="cursor:pointer">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        Импорт CSV
        <input type="file" accept=".csv" id="csvInput" style="display:none" onchange="importCSV(this)">
      </label>
      <span style="font-size:11px;color:var(--muted);font-family:'DM Mono',monospace">Amazon Bulk CSV или portfolio_id,portfolio_name</span>
    </div>
    <div class="info" id="syncResult"></div>
  </div>

  <!-- Table -->
  <div class="tw">
    <div class="thr">
      <span class="tt">Портфолио</span>
      <span class="tc" id="tMeta">Загрузка…</span>
    </div>

    <!-- Filter bar -->
    <div class="fb">
      <span class="fl">Аккаунт</span>
      <button class="fb-btn on" onclick="setFilter('type','ALL',this)">Все</button>
      <button class="fb-btn" onclick="setFilter('type','MERCH',this)">MERCH</button>
      <button class="fb-btn" onclick="setFilter('type','KDP',this)">KDP</button>
      <div class="fb-sep"></div>
      <span class="fl">Маркет</span>
      <button class="fb-btn on" id="mktAll" onclick="setFilter('mkt','ALL',this)">Все</button>
      <div id="mktFilters" style="display:contents"></div>
      <input type="text" class="fb-search" placeholder="Поиск…" oninput="renderTable()" id="searchInput">
    </div>

    <div class="tsx">
      <div id="tBody"><div class="te"><span class="sp-dark sp"></span></div></div>
    </div>

    <div class="tf">
      <span class="tf-l" id="tFooter">—</span>
      <span class="chg-badge" id="chgBadge">0 изменений</span>
    </div>
  </div>

  <!-- Save row -->
  <div class="save-row">
    <button class="btn btn-s" id="resetBtn" onclick="resetChanges()" disabled>Отменить</button>
    <button class="btn btn-g" id="saveBtn" onclick="saveChanges()" disabled>
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
      Сохранить изменения
    </button>
  </div>
  <div class="info" id="saveResult"></div>

</main>

<script>
let allPortfolios=[], changes={}, filters={type:'ALL',mkt:'ALL'};

// ── Load ─────────────────────────────────────────────────
async function loadPortfolios(){
  try{
    const d=await fetch('/portfolios/list').then(r=>r.json());
    allPortfolios=d.portfolios||[];
    buildMktFilters();
    renderTable();
  }catch(e){
    document.getElementById('tBody').innerHTML='<div class="te">Ошибка загрузки</div>';
  }
}

function buildMktFilters(){
  const mkts=[...new Set(allPortfolios.map(p=>p.marketplace))].sort();
  document.getElementById('mktFilters').innerHTML=mkts.map(m=>
    `<button class="fb-btn" onclick="setFilter('mkt','${m}',this)">${m}</button>`
  ).join('');
}

// ── Filters ───────────────────────────────────────────────
function setFilter(key,val,btn){
  filters[key]=val;
  const grp=btn.closest('.fb').querySelectorAll(`.fb-btn`);
  // Only deactivate buttons in the same logical group
  if(key==='type'){
    btn.closest('.fb').querySelectorAll('.fb-btn:not([onclick*="mkt"])').forEach(b=>b.classList.remove('on'));
  } else {
    btn.closest('.fb').querySelectorAll('.fb-btn[onclick*="mkt"]').forEach(b=>b.classList.remove('on'));
    if(val==='ALL') document.getElementById('mktAll').classList.add('on');
  }
  btn.classList.add('on');
  renderTable();
}

function getFiltered(){
  const q=document.getElementById('searchInput').value.toLowerCase();
  return allPortfolios.filter(p=>{
    if(filters.type!=='ALL'&&p.account_type!==filters.type) return false;
    if(filters.mkt!=='ALL'&&p.marketplace!==filters.mkt) return false;
    if(q){
      const n=(p.portfolio_name||'').toLowerCase();
      const id=(p.portfolio_id||'').toLowerCase();
      if(!n.includes(q)&&!id.includes(q)) return false;
    }
    return true;
  });
}

// ── Render ────────────────────────────────────────────────
function renderTable(){
  const rows=getFiltered();
  document.getElementById('tMeta').textContent=`${rows.length} из ${allPortfolios.length}`;
  document.getElementById('tFooter').textContent=`Показано ${rows.length} · колонка "Название" редактируема`;
  if(!rows.length){
    document.getElementById('tBody').innerHTML='<div class="te">Нет данных</div>';
    return;
  }
  let h=`<table><thead><tr>
    <th style="width:180px">Portfolio ID</th>
    <th style="width:80px">Аккаунт</th>
    <th style="width:60px">Маркет</th>
    <th>Название</th>
    <th>Заметки</th>
  </tr></thead><tbody>`;
  rows.forEach(p=>{
    const pid=p.portfolio_id;
    const cn=changes[pid]?.portfolio_name!==undefined?changes[pid].portfolio_name:(p.portfolio_name||'');
    const cno=changes[pid]?.notes!==undefined?changes[pid].notes:(p.notes||'');
    const mod=changes[pid]!==undefined;
    const tb=p.account_type==='MERCH'?'bm':'bk';
    const mb=p.marketplace==='US'?'bus':'bmkt';
    const chN=mod&&changes[pid]?.portfolio_name!==undefined?'ch':'';
    const chO=mod&&changes[pid]?.notes!==undefined?'ch':'';
    h+=`<tr class="${mod?'mod':''}" id="row-${pid}">
      <td style="font-family:'DM Mono',monospace;font-size:11px;color:var(--dim)">${pid}</td>
      <td><span class="b ${tb}">${p.account_type}</span></td>
      <td><span class="b ${mb}">${p.marketplace}</span></td>
      <td class="ec"><input type="text" value="${xe(cn)}" placeholder="Введите название…" class="${chN}"
        onchange="rec('${pid}','portfolio_name',this.value,'${xe(p.portfolio_name||'')}')"
        oninput="this.classList.add('ch')"
        data-orig="${xe(p.portfolio_name||'')}"></td>
      <td class="ec"><input type="text" value="${xe(cno)}" placeholder="Заметки…" class="${chO}"
        onchange="rec('${pid}','notes',this.value,'${xe(p.notes||'')}')"
        oninput="this.classList.add('ch')"
        data-orig="${xe(p.notes||'')}"></td>
    </tr>`;
  });
  h+='</tbody></table>';
  document.getElementById('tBody').innerHTML=h;
}

function xe(s){return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// ── Record change ─────────────────────────────────────────
function rec(pid,field,nv,ov){
  if(!changes[pid]) changes[pid]={};
  if(nv===ov) delete changes[pid][field];
  else changes[pid][field]=nv;
  if(!Object.keys(changes[pid]).length) delete changes[pid];
  updChg();
}
function updChg(){
  const n=Object.keys(changes).length;
  const b=document.getElementById('chgBadge');
  b.textContent=n+' изменений'; b.classList.toggle('on',n>0);
  document.getElementById('saveBtn').disabled=n===0;
  document.getElementById('resetBtn').disabled=n===0;
}
function resetChanges(){changes={};updChg();renderTable();}

// ── Sync ──────────────────────────────────────────────────
async function syncPortfolios(){
  const btn=document.getElementById('syncBtn');
  const res=document.getElementById('syncResult');
  btn.disabled=true;
  btn.innerHTML='<span class="sp"></span> Обновляем...';
  res.className='info inf on'; res.textContent='Сканируем таблицы кампаний...';
  try{
    const d=await fetch('/portfolios/sync',{method:'POST'}).then(r=>r.json());
    if(d.error) throw new Error(d.error);
    res.className='info ok on';
    res.textContent=`✓ Готово · Найдено: ${d.total} · Добавлено новых: ${d.inserted}`;
    await loadPortfolios();
  }catch(e){
    res.className='info err on'; res.textContent='✕ Ошибка: '+e.message;
  }finally{
    btn.disabled=false;
    btn.innerHTML='<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/></svg> Обновить список';
  }
}

// ── Save ──────────────────────────────────────────────────
async function saveChanges(){
  const btn=document.getElementById('saveBtn');
  const res=document.getElementById('saveResult');
  btn.disabled=true;
  btn.innerHTML='<span class="sp"></span> Сохраняем...';
  res.className='info inf on'; res.textContent='Отправляем изменения...';
  try{
    const payload=Object.keys(changes).map(pid=>{
      const orig=allPortfolios.find(p=>p.portfolio_id===pid);
      const delta=changes[pid];
      return{portfolio_id:pid,account_type:orig.account_type,marketplace:orig.marketplace,
        portfolio_name:delta.portfolio_name!==undefined?delta.portfolio_name:(orig.portfolio_name||''),
        notes:delta.notes!==undefined?delta.notes:(orig.notes||'')};
    });
    const d=await fetch('/portfolios/bulk-update',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({changes:payload})}).then(r=>r.json());
    if(d.error) throw new Error(d.error);
    res.className='info ok on';
    res.textContent=`✓ Сохранено ${d.updated} портфолио · ${new Date().toLocaleTimeString('ru')}`;
    payload.forEach(p=>{const o=allPortfolios.find(x=>x.portfolio_id===p.portfolio_id);if(o){o.portfolio_name=p.portfolio_name;o.notes=p.notes;}});
    changes={};updChg();renderTable();
  }catch(e){
    res.className='info err on'; res.textContent='✕ Ошибка: '+e.message;
    btn.disabled=false;
  }finally{
    btn.innerHTML='<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg> Сохранить изменения';
    updChg();
  }
}

// ── Import CSV ────────────────────────────────────────────
async function importCSV(input){
  const file=input.files[0]; if(!file) return;
  const res=document.getElementById('syncResult');
  res.className='info inf on'; res.textContent='Читаем CSV...';
  try{
    const text=await file.text();
    const lines=text.trim().split('\n').filter(l=>l.trim());
    if(!lines.length) throw new Error('Файл пустой');
    const sep=lines[0].includes(';')?';':',';
    const headers=lines[0].split(sep).map(h=>h.trim().replace(/^\uFEFF/,'').replace(/^"|"$/g,'').toLowerCase());
    const idxId=headers.findIndex(h=>h.includes('portfolio id')||h==='portfolio_id');
    const idxName=headers.findIndex(h=>h.includes('portfolio name')||h==='portfolio_name');
    const idxEntity=headers.findIndex(h=>h==='entity');
    if(idxId===-1||idxName===-1) throw new Error(`Не найдены колонки. Заголовки: ${headers.join(', ')}`);
    const rows=[];
    for(let i=1;i<lines.length;i++){
      const cols=lines[i].split(sep).map(c=>c.trim().replace(/^"|"$/g,''));
      if(idxEntity!==-1&&cols[idxEntity]&&cols[idxEntity].toLowerCase()!=='portfolio') continue;
      const pid=cols[idxId]?.trim(), pname=cols[idxName]?.trim();
      if(!pid||!pname) continue;
      rows.push({portfolio_id:pid,portfolio_name:pname});
    }
    if(!rows.length) throw new Error('Нет подходящих строк в файле');
    res.textContent=`Найдено ${rows.length} портфолио, отправляем...`;
    const d=await fetch('/portfolios/import-csv',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({rows})}).then(r=>r.json());
    if(d.error) throw new Error(d.error);
    res.className='info ok on';
    res.textContent=`✓ Импортировано ${d.updated} из ${rows.length} · ${new Date().toLocaleTimeString('ru')}`;
    await loadPortfolios();
  }catch(e){
    res.className='info err on'; res.textContent='✕ Ошибка: '+e.message;
  }finally{input.value='';}
}

loadPortfolios();
</script>
</body>
</html>
