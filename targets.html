<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Таргеты · Amazon Ads</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f4f4f6;--surface:#fff;--surface2:#f0f0f3;--border:#e2e2e8;--border2:#ccccd4;
  --text:#18181c;--muted:#6b6b7a;--dim:#aaaaB8;
  --accent:#c84b14;--accent-bg:rgba(200,75,20,.07);--accent-bd:rgba(200,75,20,.22);
  --green:#1a8f5c;--green-bg:rgba(26,143,92,.08);--green-bd:rgba(26,143,92,.2);
  --red:#d94040;--red-bd:rgba(217,64,64,.22);
  --amber:#b07800;
  --blue:#1a6fd4;--blue-bg:rgba(26,111,212,.07);--blue-bd:rgba(26,111,212,.2);
  --purple:#6c3fc9;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh}

header{display:flex;align-items:center;justify-content:space-between;padding:0 32px;height:52px;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:200;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.logo{display:flex;align-items:center;gap:10px;font-size:13px;font-weight:600}
.logo-dot{width:26px;height:26px;border-radius:7px;background:var(--accent);display:flex;align-items:center;justify-content:center}
nav{display:flex;gap:2px}
nav a{padding:5px 12px;border-radius:6px;font-size:13px;font-weight:500;color:var(--muted);text-decoration:none;transition:color .15s,background .15s}
nav a:hover{color:var(--text);background:var(--surface2)}
nav a.active{color:var(--accent);background:var(--accent-bg)}

main{padding:18px 32px;max-width:1720px;margin:0 auto}

/* filters */
.fp{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:13px 16px;margin-bottom:14px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.fr{display:flex;align-items:flex-end;gap:10px;flex-wrap:wrap}
.fg{display:flex;flex-direction:column;gap:4px}
.fl{font-family:'DM Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted)}
.fg input,.fg select{height:34px;border:1px solid var(--border);border-radius:6px;background:var(--surface);color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;padding:0 10px;outline:none;transition:border-color .15s}
.fg input:focus,.fg select:focus{border-color:var(--accent)}
.at{display:flex;gap:4px}
.atb{height:34px;padding:0 14px;border-radius:6px;border:1px solid var(--border);background:var(--surface);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;color:var(--muted);transition:all .15s}
.atb.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn{height:34px;padding:0 16px;border-radius:6px;border:none;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:6px;transition:all .15s;white-space:nowrap}
.btn-p{background:var(--accent);color:#fff}.btn-p:hover{background:#a83d10}
.btn-s{background:var(--surface);color:var(--text);border:1px solid var(--border)}.btn-s:hover{background:var(--surface2)}

/* mode tabs (bottom of filter panel) */
.mode-row{display:flex;align-items:center;gap:8px;padding-top:10px;margin-top:10px;border-top:1px solid var(--border)}
.mode-lbl{font-family:'DM Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted)}
.mbt{height:30px;padding:0 14px;border-radius:6px;border:1px solid var(--border);background:var(--surface);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;cursor:pointer;color:var(--muted);transition:all .15s}
.mbt.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.sep{width:1px;height:20px;background:var(--border);margin:0 4px}
.ttype-lbl{font-family:'DM Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted)}
.ttype-btns{display:flex;gap:3px}
.ttype-btn{height:26px;padding:0 10px;border-radius:5px;border:1px solid var(--border);background:var(--surface);font-family:'DM Sans',sans-serif;font-size:12px;cursor:pointer;color:var(--muted);transition:all .15s}
.ttype-btn.on{background:var(--accent-bg);color:var(--accent);border-color:var(--accent-bd)}

/* portfolio dropdown */
.pdw{position:relative}
.pdt{height:34px;min-width:180px;border:1px solid var(--border);border-radius:6px;background:var(--surface);color:var(--text);font-size:13px;padding:0 26px 0 10px;display:flex;align-items:center;cursor:pointer;transition:border-color .15s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;user-select:none}
.pdt:hover,.pdt.on{border-color:var(--accent)}
.pda{position:absolute;right:8px;top:50%;transform:translateY(-50%);pointer-events:none;color:var(--muted)}
.pdd{display:none;position:absolute;top:calc(100% + 4px);left:0;z-index:9999;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:8px;min-width:260px;max-height:300px;overflow-y:auto;box-shadow:0 4px 20px rgba(0,0,0,.12)}
.pdd.on{display:block}
.pds{width:100%;height:30px;margin-bottom:6px;border:1px solid var(--border);border-radius:5px;background:var(--surface2);color:var(--text);font-size:12px;padding:0 8px;outline:none}
.pds:focus{border-color:var(--accent)}
.pdi{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:5px;cursor:pointer;font-size:12px}
.pdi:hover{background:var(--surface2)}
.pdi input{accent-color:var(--accent);flex-shrink:0;width:14px;height:14px}
.pdi span{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pd-empty{padding:10px;font-size:12px;color:var(--muted);text-align:center}

/* summary cards */
.sr{display:grid;grid-template-columns:repeat(8,1fr);gap:10px;margin-bottom:14px}
.sc{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:11px 13px;box-shadow:0 1px 2px rgba(0,0,0,.04)}
.sl{font-family:'DM Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:3px}
.sv{font-size:16px;font-weight:600}
.sv.g{color:var(--green)}.sv.a{color:var(--accent)}.sv.b{color:var(--blue)}

/* table */
.tw{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.thr{display:flex;align-items:center;justify-content:space-between;padding:11px 16px;border-bottom:1px solid var(--border)}
.tt{font-size:14px;font-weight:600}
.tc{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted)}
.tsx{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{text-align:left;padding:8px 11px;font-family:'DM Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);background:var(--surface2);border-bottom:1px solid var(--border);white-space:nowrap;cursor:pointer;user-select:none}
thead th:hover{color:var(--text)}
thead th.s{color:var(--accent)}
thead th.ns{cursor:default}
thead th.ns:hover{color:var(--muted)}
tr.dr{border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s}
tr.dr:last-child{border-bottom:none}
tr.dr:hover{background:#fafafa}
tr.dr.exp{background:var(--accent-bg)}
td{padding:9px 11px;vertical-align:middle}

/* expand row */
tr.er td{padding:0}
.ei{background:#f7f7fb;border-top:2px solid var(--accent-bd)}

/* group detail panel */
.gdp{padding:14px 18px}
.gdt{font-family:'DM Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:10px}

/* inner tabs */
.itabs{display:flex;border-bottom:1px solid var(--border);background:#fafafa;padding:0 11px}
.itab{padding:5px 9px;font-size:11px;font-family:'DM Mono',monospace;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s;white-space:nowrap}
.itab:hover{color:var(--text)}
.itab.on{color:var(--accent);border-bottom-color:var(--accent)}
.itb{display:inline-block;min-width:15px;padding:0 3px;margin-left:3px;border-radius:99px;font-size:9px;background:var(--surface2);color:var(--dim);text-align:center}
.itab.on .itb{background:var(--accent-bg);color:var(--accent)}
.itp{display:none}.itp.on{display:block}

/* inner items list */
.ih2{display:grid;padding:4px 11px;background:#f5f5f9;border-bottom:1px solid var(--border)}
.ih2 span{font-family:'DM Mono',monospace;font-size:9px;text-transform:uppercase;letter-spacing:.06em;color:var(--dim);text-align:right}
.ih2 span:first-child,.ih2 span:nth-child(2){text-align:left}
.ii2{display:grid;align-items:center;padding:5px 11px;border-bottom:1px solid var(--border);gap:3px}
.ii2:last-child{border-bottom:none}
.ii2:hover{background:var(--surface2)}
.grid-tgts{grid-template-columns:22px 1fr 90px 80px 70px 65px 88px 85px 72px}
.grid-negs{grid-template-columns:22px 1fr 90px 100px}
.it2{font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ir2{font-family:'DM Mono',monospace;font-size:11px;text-align:right;color:var(--muted);white-space:nowrap}
.ge{padding:12px;text-align:center;color:var(--dim);font-size:11px}

/* cell types */
.name-cell{display:flex;flex-direction:column;gap:2px}
.name-main{font-size:13px;font-weight:500}
.name-sub{font-size:11px;color:var(--muted);max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* badges */
.b{display:inline-flex;align-items:center;font-family:'DM Mono',monospace;font-size:9px;padding:1px 5px;border-radius:4px;font-weight:500;white-space:nowrap}
.be{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bd)}
.bp{background:rgba(160,160,170,.1);color:var(--muted);border:1px solid var(--border)}
.ba{background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-bd)}
.bm{background:var(--surface2);color:var(--muted);border:1px solid var(--border)}
.bauto{background:rgba(108,63,201,.07);color:var(--purple);border:1px solid rgba(108,63,201,.15)}
.bman{background:var(--accent-bg);color:var(--accent);border:1px solid var(--accent-bd)}
.bkw{background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-bd)}
.bpt{background:rgba(26,143,92,.06);color:var(--green);border:1px solid var(--green-bd)}

/* numbers */
.n{font-family:'DM Mono',monospace;font-size:12px}
td.r{text-align:right}
.gn{color:var(--green)}.an{color:var(--accent)}.bn{color:var(--blue)}
.ok{color:var(--green);font-weight:600}.hi{color:var(--amber);font-weight:600}.cr{color:var(--red);font-weight:600}.dv{color:var(--dim)}

/* misc */
.eb{background:rgba(217,64,64,.07);border:1px solid var(--red-bd);border-radius:8px;padding:11px 15px;color:var(--red);font-size:13px;margin-bottom:14px}
.te{padding:60px;text-align:center;color:var(--muted);font-size:13px}
.sp{display:inline-block;width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.pg{display:flex;align-items:center;justify-content:space-between;padding:11px 16px;border-top:1px solid var(--border)}
.pi{font-size:12px;color:var(--muted);font-family:'DM Mono',monospace}
.pb{display:flex;gap:4px}
.pbb{height:28px;min-width:28px;padding:0 8px;border-radius:5px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:12px;cursor:pointer;font-family:'DM Mono',monospace;transition:all .15s}
.pbb:hover{background:var(--surface2)}.pbb.on{background:var(--accent);border-color:var(--accent);color:#fff}
.pbb:disabled{opacity:.4;cursor:not-allowed}
.rchev{color:var(--dim);transition:transform .2s}
.rchev.op{transform:rotate(180deg)}
.sa{opacity:.3;margin-left:2px}
thead th.s .sa{opacity:1;color:var(--accent)}

/* column filter popups */
.th-wrap{display:flex;align-items:center;gap:3px;justify-content:flex-end;position:relative}
.th-wrap.left{justify-content:flex-start}
.th-sort{cursor:pointer;display:flex;align-items:center;gap:2px;flex:1;min-width:0}
.th-sort.left{justify-content:flex-start}
.th-fi{width:14px;height:14px;display:flex;align-items:center;justify-content:center;border-radius:3px;cursor:pointer;color:var(--dim);flex-shrink:0;transition:color .1s}
.th-fi:hover{color:var(--accent);background:var(--accent-bg)}
.th-fi.on{color:var(--accent)}
.npop{position:absolute;top:calc(100%+4px);right:0;z-index:9999;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px;min-width:180px;box-shadow:0 4px 20px rgba(0,0,0,.12);display:none}
.npop.op{display:block}
.npop-title{font-family:'DM Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:8px}
.npop-row{display:flex;gap:6px;margin-bottom:6px;align-items:center}
.npop-op{height:28px;border:1px solid var(--border);border-radius:5px;background:var(--surface2);color:var(--text);font-size:12px;padding:0 6px;outline:none;flex-shrink:0}
.npop-op:focus{border-color:var(--accent)}
.npop-v{height:28px;border:1px solid var(--border);border-radius:5px;background:var(--surface2);color:var(--text);font-size:12px;padding:0 7px;outline:none;flex:1;min-width:0}
.npop-v:focus{border-color:var(--accent)}
.npop-acts{display:flex;gap:6px;margin-top:8px}
.npop-apply{height:26px;padding:0 10px;border-radius:5px;border:none;background:var(--accent);color:#fff;font-size:11px;font-weight:500;cursor:pointer}
.npop-apply:hover{background:#a83d10}
.npop-clear{height:26px;padding:0 10px;border-radius:5px;border:1px solid var(--border);background:var(--surface);color:var(--muted);font-size:11px;cursor:pointer}
.npop-clear:hover{background:var(--surface2)}

.stl{padding:18px;text-align:center;color:var(--muted);font-size:12px;display:flex;align-items:center;justify-content:center;gap:8px}
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-dot"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/></svg></div>
    Amazon Ads Automation
  </div>
  <nav>
    <a href="/">Главная</a>
    <a href="/analytics/campaigns">Кампании</a>
    <a href="/analytics/products">Products</a>
    <a href="/targets" class="active">Таргеты</a>
    <a href="/portfolios">Портфолио</a>
    <a href="/control">Изменения</a>
  </nav>
</header>

<main>

<!-- Filters -->
<div class="fp">
  <div class="fr">
    <div class="fg"><div class="fl">Аккаунт</div>
      <div class="at">
        <button class="atb on" id="tbM" onclick="setAcct('MERCH')">MERCH</button>
        <button class="atb"    id="tbK" onclick="setAcct('KDP')">KDP</button>
      </div>
    </div>
    <div class="fg"><div class="fl">Дата от</div><input type="date" id="df" style="width:148px"></div>
    <div class="fg"><div class="fl">Дата до</div><input type="date" id="dt" style="width:148px"></div>
    <div class="fg"><div class="fl">Маркетплейс</div><select id="mkt" style="width:100px"></select></div>
    <div class="fg"><div class="fl">Портфолио</div>
      <div class="pdw" id="pdw">
        <div class="pdt" id="pdt" onclick="pfToggle(event)"><span id="pdl">Все</span></div>
        <svg class="pda" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
        <div class="pdd" id="pdd">
          <input class="pds" id="pds" placeholder="Поиск…" oninput="pfSearch(this.value)">
          <div id="pdlist"></div>
        </div>
      </div>
    </div>
    <div class="fg"><div class="fl">Поиск</div><input type="text" id="srch" placeholder="Название…" style="width:200px" onkeydown="if(event.key==='Enter')load(1)"></div>
    <div class="fg"><div class="fl">Статус</div>
      <select id="stateF" style="width:120px">
        <option value="">Все</option>
        <option value="ENABLED">Активные</option>
        <option value="PAUSED">Паузные</option>
        <option value="ARCHIVED">Архив</option>
      </select>
    </div>
    <div class="fg"><div class="fl">Статус кампании</div>
      <select id="campStateF" style="width:120px">
        <option value="">Все</option>
        <option value="ENABLED">Активные</option>
        <option value="PAUSED">Паузные</option>
      </select>
    </div>
    <button class="btn btn-p" onclick="load(1)">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      Применить
    </button>
  </div>

  <!-- Mode + type sub-filter -->
  <div class="mode-row">
    <span class="mode-lbl">Режим</span>
    <button class="mbt on" id="mbGroups" onclick="setMode('groups')">Группы</button>
    <button class="mbt"    id="mbTargets" onclick="setMode('targets')">Таргеты</button>
    <div class="sep" id="typeSep" style="display:none"></div>
    <span class="ttype-lbl" id="ttypeLbl" style="display:none">Тип</span>
    <div class="ttype-btns" id="ttypeBtns" style="display:none">
      <button class="ttype-btn on" onclick="setTType('')">Все</button>
      <button class="ttype-btn"   onclick="setTType('keyword')">Ключевые слова</button>
      <button class="ttype-btn"   onclick="setTType('auto')">Авто</button>
      <button class="ttype-btn"   onclick="setTType('product')">Продуктовые</button>
    </div>
  </div>
</div>

<!-- Error -->
<div class="eb" id="err" style="display:none"></div>

<!-- Summary cards -->
<div class="sr" id="sumRow">
  <div class="sc"><div class="sl" id="sumLbl">Групп</div><div class="sv" id="sumTotal">—</div></div>
  <div class="sc"><div class="sl">Показы</div><div class="sv b" id="sumImpr">—</div></div>
  <div class="sc"><div class="sl">Клики</div><div class="sv" id="sumClicks">—</div></div>
  <div class="sc"><div class="sl">CTR</div><div class="sv" id="sumCtr">—</div></div>
  <div class="sc"><div class="sl">Расход</div><div class="sv a" id="sumCost">—</div></div>
  <div class="sc"><div class="sl">Продажи 14d</div><div class="sv g" id="sumSales">—</div></div>
  <div class="sc"><div class="sl">Заказы</div><div class="sv" id="sumPurch">—</div></div>
  <div class="sc"><div class="sl">ACoS</div><div class="sv" id="sumAcos">—</div></div>
</div>

<!-- Table -->
<div class="tw">
  <div class="thr">
    <span class="tt" id="tblTitle">Группы объявлений</span>
    <span class="tc" id="tblCount"></span>
  </div>
  <div class="tsx">
    <table id="tbl">
      <thead id="thead"></thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
  <div class="pg" id="pgWrap" style="display:none">
    <span class="pi" id="pgInfo"></span>
    <div class="pb" id="pgBtns"></div>
  </div>
</div>

</main>

<script>
// ── State ──────────────────────────────────────────────────
let S = {
  acct: 'MERCH', mode: 'groups', ttype: '',
  df: '', dt: '', mkt: '', portfolios: [],
  name: '', state: '', campState: '',
  sort: 'clicks', dir: 'desc',
  page: 1, perPage: 50, total: 0,
  numFilters: {},
  openGroupId: null, openGroupMkt: null,
};

let allPortfolios = [];

// ── Init ──────────────────────────────────────────────────
(function(){
  const now  = new Date();
  const to   = fmtDate(now);
  const from = fmtDate(new Date(now - 30*864e5));
  document.getElementById('df').value = from;
  document.getElementById('dt').value = to;
  S.df = from; S.dt = to;
  loadPortfolios();
  load(1);
})();

function fmtDate(d){
  return d.toISOString().slice(0,10);
}

// ── Account ───────────────────────────────────────────────
function setAcct(a){
  S.acct = a;
  document.getElementById('tbM').classList.toggle('on', a==='MERCH');
  document.getElementById('tbK').classList.toggle('on', a==='KDP');
  loadPortfolios();
  load(1);
}

// ── Mode ──────────────────────────────────────────────────
function setMode(m){
  S.mode = m;
  S.sort = 'clicks'; S.dir = 'desc'; S.page = 1;
  document.getElementById('mbGroups').classList.toggle('on', m==='groups');
  document.getElementById('mbTargets').classList.toggle('on', m==='targets');
  const show = m === 'targets';
  document.getElementById('typeSep').style.display   = show ? '' : 'none';
  document.getElementById('ttypeLbl').style.display  = show ? '' : 'none';
  document.getElementById('ttypeBtns').style.display = show ? '' : 'none';

// ── Load data ─────────────────────────────────────────────
function load(pg){
  S.page    = pg || 1;
  S.df      = document.getElementById('df').value;
  S.dt      = document.getElementById('dt').value;
  S.mkt     = document.getElementById('mkt').value;
  S.name    = document.getElementById('srch').value.trim();
  S.state   = document.getElementById('stateF').value;
  S.campState = document.getElementById('campStateF').value;

  const params = new URLSearchParams({
    account_type:  S.acct,
    mode:          S.mode,
    date_from:     S.df,
    date_to:       S.dt,
    marketplace:   S.mkt,
    portfolio_ids: S.portfolios.join(','),
    name:          S.name,
    state:         S.state,
    campaign_state:S.campState,
    target_type:   S.ttype,
    sort_by:       S.sort,
    sort_dir:      S.dir,
    page:          S.page,
    per_page:      S.perPage,
  });

  // numeric filters
  for(const [k,v] of Object.entries(S.numFilters)){
    if(v.op && v.val!=='') { params.set(k+'_op', v.op); params.set(k+'_val', v.val); }
    if(v.min!=='') params.set(k+'_min', v.min);
    if(v.max!=='') params.set(k+'_max', v.max);
  }

  document.getElementById('tbody').innerHTML = '<tr><td colspan="20" class="te"><span class="sp"></span></td></tr>';
  document.getElementById('err').style.display = 'none';
  document.getElementById('pgWrap').style.display = 'none';

  fetch(`/targets/data?${params}`)
    .then(r=>r.json())
    .then(d=>{
      if(d.error){ showErr(d.error); return; }
      S.total = d.total;
      renderSummary(d.summary);
      if(S.mode === 'groups') renderGroups(d.rows);
      else                    renderTargets(d.rows);
      renderPagination(d.total, d.page, d.per_page);
      document.getElementById('tblCount').textContent = `${d.total.toLocaleString()} записей`;
    })
    .catch(e=>showErr(e.message));
}

function showErr(msg){
  const el = document.getElementById('err');
  el.textContent = 'Ошибка: ' + msg;
  el.style.display = '';
}

function toggleGroup(gid, mkt){
  const tr  = document.getElementById('gr_'+gid);
  const er  = document.getElementById('er_'+gid);
  const chev= document.getElementById('chev_'+gid);
  const ei  = document.getElementById('ei_'+gid);
  const isOpen = er.style.display !== 'none';

  // close previously open
  if(S.openGroupId && S.openGroupId !== gid){
    const otr  = document.getElementById('gr_'+S.openGroupId);
    const oer  = document.getElementById('er_'+S.openGroupId);
    const och  = document.getElementById('chev_'+S.openGroupId);
    if(oer){ oer.style.display='none'; }
    if(otr){ otr.classList.remove('exp'); }
    if(och){ och.classList.remove('op'); }
  }

  if(isOpen){
    er.style.display = 'none';
    tr.classList.remove('exp');
    chev.classList.remove('op');
    S.openGroupId  = null;
    S.openGroupMkt = null;
  } else {
    er.style.display = '';
    tr.classList.add('exp');
    chev.classList.add('op');
    S.openGroupId  = gid;
    S.openGroupMkt = mkt;
    loadGroupDetail(gid, mkt, ei);
  }
}

// ── Pagination ────────────────────────────────────────────
function renderPagination(total, page, perPage){
  const pages = Math.ceil(total / perPage) || 1;
  const wrap  = document.getElementById('pgWrap');
  const info  = document.getElementById('pgInfo');
  const btns  = document.getElementById('pgBtns');
  wrap.style.display = '';
  const from = (page-1)*perPage+1, to = Math.min(page*perPage, total);
  info.textContent = `${from}–${to} из ${total.toLocaleString()}`;

  let html = `<button class="pbb" ${page<=1?'disabled':''} onclick="load(${page-1})">‹</button>`;
  const range = pageRange(page, pages);
  for(const p of range){
    if(p==='…') html += `<button class="pbb" disabled>…</button>`;
    else html += `<button class="pbb ${p===page?'on':''}" onclick="load(${p})">${p}</button>`;
  }
  html += `<button class="pbb" ${page>=pages?'disabled':''} onclick="load(${page+1})">›</button>`;
  btns.innerHTML = html;
}
function pageRange(p,t){
  if(t<=7) return Array.from({length:t},(_,i)=>i+1);
  if(p<=4) return [1,2,3,4,5,'…',t];
  if(p>=t-3) return [1,'…',t-4,t-3,t-2,t-1,t];
  return [1,'…',p-1,p,p+1,'…',t];
}

// ── Sort ──────────────────────────────────────────────────
function sortBy(col){
  if(S.sort===col) S.dir = S.dir==='asc'?'desc':'asc';
  else { S.sort=col; S.dir='desc'; }
  load(S.page);
}

// ── Column numeric filter ─────────────────────────────────
function openNumPop(col, el){
  document.querySelectorAll('.npop').forEach(p=>p.classList.remove('op'));
  const p = document.getElementById('np_'+col);
  if(p){ p.classList.add('op'); el.classList.add('on'); }
}
function applyNumFilter(col){
  const op  = document.getElementById('nop_'+col)?.value || '';
  const val = document.getElementById('nval_'+col)?.value || '';
  const mn  = document.getElementById('nmin_'+col)?.value || '';
  const mx  = document.getElementById('nmax_'+col)?.value || '';
  S.numFilters[col] = {op,val,min:mn,max:mx};
  document.querySelectorAll('.npop').forEach(p=>p.classList.remove('op'));
  const fi = document.querySelector(`[data-fi="${col}"]`);
  if(fi) fi.classList.toggle('on', !!(op&&val)||mn||mx);
  load(1);
}
function clearNumFilter(col){
  S.numFilters[col] = {op:'',val:'',min:'',max:''};
  ['nop_','nval_','nmin_','nmax_'].forEach(pfx=>{
    const el = document.getElementById(pfx+col);
    if(el) el.value='';
  });
  const fi = document.querySelector(`[data-fi="${col}"]`);
  if(fi) fi.classList.remove('on');
  document.querySelectorAll('.npop').forEach(p=>p.classList.remove('op'));
  load(1);
}
document.addEventListener('click', e=>{
  if(!e.target.closest('.th-wrap')) document.querySelectorAll('.npop').forEach(p=>p.classList.remove('op'));
});

// ── Helpers: TH builders ──────────────────────────────────
function thSort(col, label, align){
  const a = align||'right', isAct = S.sort===col;
  const arr = isAct ? (S.dir==='asc' ? '↑' : '↓') : '';
  return `<th class="${isAct?'s':''}" onclick="sortBy('${col}')">
    <div class="th-wrap ${a==='left'?'left':''}">
      <div class="th-sort ${a==='left'?'left':''}">${label} <span class="sa">${arr}</span></div>
    </div>
  </th>`;
}
function th(label, cls){
  return `<th class="${cls||'ns'}">${label}</th>`;
}
function thNum(col, label){
  const isAct = S.sort===col;
  const nf = S.numFilters[col]||{};
  const hasFilter = (nf.op&&nf.val!=='')||nf.min||nf.max;
  const arr = isAct ? (S.dir==='asc' ? '↑' : '↓') : '';
  return `<th class="${isAct?'s':''}">
    <div class="th-wrap">
      <div class="th-sort" onclick="sortBy('${col}')">${label} <span class="sa">${arr}</span></div>
      <div class="th-fi ${hasFilter?'on':''}" data-fi="${col}" onclick="openNumPop('${col}',this)">
        <svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>
      </div>
      <div class="npop" id="np_${col}">
        <div class="npop-title">${label}</div>
        <div class="npop-row">
          <select class="npop-op" id="nop_${col}">
            <option value="">—</option>
            <option value="gt">&gt;</option><option value="gte">&ge;</option>
            <option value="lt">&lt;</option><option value="lte">&le;</option>
            <option value="eq">=</option>
          </select>
          <input class="npop-v" id="nval_${col}" type="number" placeholder="Значение">
        </div>
        <div class="npop-row">
          <input class="npop-v" id="nmin_${col}" type="number" placeholder="Мин">
          <input class="npop-v" id="nmax_${col}" type="number" placeholder="Макс">
        </div>
        <div class="npop-acts">
          <button class="npop-apply" onclick="applyNumFilter('${col}')">Применить</button>
          <button class="npop-clear"  onclick="clearNumFilter('${col}')">Сбросить</button>
        </div>
      </div>
    </div>
  </th>`;
}

// ── Badges & helpers ──────────────────────────────────────
function stateBadge(s){
  if(!s) return '';
  if(s==='ENABLED')  return '<span class="b be">ACTIVE</span>';
  if(s==='PAUSED')   return '<span class="b bp">PAUSED</span>';
  if(s==='ARCHIVED') return '<span class="b bm">ARCH</span>';
  return `<span class="b bm">${esc(s)}</span>`;
}
function typeBadge(t){
  if(!t) return '';
  if(t==='AUTO')   return '<span class="b bauto">AUTO</span>';
  if(t==='MANUAL') return '<span class="b bman">MANUAL</span>';
  return `<span class="b bm">${esc(t)}</span>`;
}
function kwTypeBadge(t){
  if(!t) return '<span class="dv">—</span>';
  if(t==='BROAD')  return '<span class="b bkw">BROAD</span>';
  if(t==='PHRASE') return '<span class="b bkw">PHRASE</span>';
  if(t==='EXACT')  return '<span class="b bkw">EXACT</span>';
  if(t==='TARGETING_EXPRESSION_PREDEFINED') return '<span class="b bauto">AUTO</span>';
  if(t==='TARGETING_EXPRESSION')            return '<span class="b bpt">PRODUCT</span>';
  return `<span class="b bm">${esc(t)}</span>`;
}
function kwTypeIcon(t){
  if(t==='TARGETING_EXPRESSION_PREDEFINED')
    return '<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="var(--purple)" stroke-width="2.5"><circle cx="12" cy="12" r="9"/><path d="M12 8v4l3 3"/></svg>';
  if(t==='TARGETING_EXPRESSION')
    return '<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="var(--green)" stroke-width="2.5"><rect x="3" y="3" width="18" height="18" rx="2"/></svg>';
  return '<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="var(--blue)" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>';
}
function acosClass(v){
  if(v==null) return '';
  if(v<=20) return 'ok'; if(v<=40) return 'hi'; return 'cr';
}
function fmtNum(n){ return (n||0).toLocaleString(); }
function esc(s){
  if(s==null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
