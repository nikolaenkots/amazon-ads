<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Сравнение продаж · Amazon Ads</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
:root{
  --bg:#f4f4f6;--surface:#fff;--surface2:#f0f0f3;--border:#e2e2e8;--border2:#ccccd4;
  --text:#18181c;--muted:#6b6b7a;--dim:#aaaab8;
  --accent:#c84b14;--accent-bg:rgba(200,75,20,.07);--accent-bd:rgba(200,75,20,.22);
  --green:#1a8f5c;--green-bg:rgba(26,143,92,.08);--green-bd:rgba(26,143,92,.2);
  --red:#d94040;--red-bd:rgba(217,64,64,.22);--red-bg:rgba(217,64,64,.07);
  --amber:#b07800;--amber-bg:rgba(176,120,0,.07);--amber-bd:rgba(176,120,0,.2);
  --blue:#1a6fd4;--blue-bg:rgba(26,111,212,.07);--blue-bd:rgba(26,111,212,.2);
  --purple:#6c3fc9;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{overflow-anchor:none}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh}
header{display:flex;align-items:center;justify-content:space-between;padding:0 32px;height:52px;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:200;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.logo{display:flex;align-items:center;gap:10px;font-size:13px;font-weight:600}
.logo-dot{width:26px;height:26px;border-radius:7px;background:var(--accent);display:flex;align-items:center;justify-content:center}
nav{display:flex;gap:2px}
nav a{padding:5px 12px;border-radius:6px;font-size:13px;font-weight:500;color:var(--muted);text-decoration:none;transition:color .15s,background .15s}
nav a:hover{color:var(--text);background:var(--surface2)}
nav a.active{color:var(--accent);background:var(--accent-bg)}
main{padding:18px 32px;max-width:1820px;margin:0 auto}

/* Filter panel */
.fp{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:13px 16px;margin-bottom:14px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.fr{display:flex;align-items:flex-end;gap:10px;flex-wrap:wrap}
.fg{display:flex;flex-direction:column;gap:4px}
.fl{font-family:'DM Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted)}
.fg input,.fg select{height:34px;border:1px solid var(--border);border-radius:6px;background:var(--surface);color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;padding:0 10px;outline:none;transition:border-color .15s}
.fg input:focus,.fg select:focus{border-color:var(--accent)}
.at{display:flex;gap:4px}
.atb{height:34px;padding:0 14px;border-radius:6px;border:1px solid var(--border);background:var(--surface);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;color:var(--muted);transition:all .15s}
.atb.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn{height:34px;padding:0 16px;border-radius:6px;border:none;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:6px;transition:all .15s;white-space:nowrap}
.btn-p{background:var(--accent);color:#fff}.btn-p:hover{background:#a83d10}
.btn-s{background:var(--surface);color:var(--text);border:1px solid var(--border)}.btn-s:hover{background:var(--surface2)}
.mode-row{display:flex;align-items:center;gap:8px;padding-top:10px;margin-top:10px;border-top:1px solid var(--border);flex-wrap:wrap}
.mode-lbl{font-family:'DM Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted)}
.mbt{height:28px;padding:0 12px;border-radius:6px;border:1px solid var(--border);background:var(--surface);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;cursor:pointer;color:var(--muted);transition:all .15s}
.mbt.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.sep{width:1px;height:20px;background:var(--border);margin:0 4px}

/* Portfolio / ProductType dropdowns */
.pdw,.ptdw{position:relative}
.pdt{height:34px;min-width:160px;border:1px solid var(--border);border-radius:6px;background:var(--surface);color:var(--text);font-size:13px;padding:0 26px 0 10px;display:flex;align-items:center;cursor:pointer;transition:border-color .15s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;user-select:none}
.pdt:hover,.pdt.on{border-color:var(--accent)}
.pda{position:absolute;right:8px;top:50%;transform:translateY(-50%);pointer-events:none;color:var(--muted)}
.pdd{display:none;position:absolute;top:calc(100% + 4px);left:0;z-index:9999;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:8px;min-width:260px;max-height:300px;overflow-y:auto;box-shadow:0 4px 20px rgba(0,0,0,.12)}
.pdd.on{display:block}
.pds{width:100%;height:30px;margin-bottom:6px;border:1px solid var(--border);border-radius:5px;background:var(--surface2);color:var(--text);font-size:12px;padding:0 8px;outline:none}
.pds:focus{border-color:var(--accent)}
.pdi{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:5px;cursor:pointer;font-size:12px}
.pdi:hover{background:var(--surface2)}
.pdi input{accent-color:var(--accent);flex-shrink:0;width:14px;height:14px}
.pdi span{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pd-empty{padding:10px;font-size:12px;color:var(--muted);text-align:center}

/* Summary bar */
.sr{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin-bottom:14px}
.sc{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:11px 13px;box-shadow:0 1px 2px rgba(0,0,0,.04)}
.sl{font-family:'DM Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:3px}
.sv{font-size:16px;font-weight:600}
.sv.g{color:var(--green)}.sv.a{color:var(--accent)}.sv.b{color:var(--blue)}

/* Table */
.tw{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.thr{display:flex;align-items:center;justify-content:space-between;padding:11px 16px;border-bottom:1px solid var(--border)}
.tt{font-size:14px;font-weight:600}
.tc{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted)}
.tsx{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{text-align:left;padding:8px 11px;font-family:'DM Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);background:var(--surface2);border-bottom:1px solid var(--border);white-space:nowrap;cursor:pointer;user-select:none}
thead th:hover{color:var(--text)}
thead th.s{color:var(--accent)}
thead th.ns{cursor:default}
thead th.ns:hover{color:var(--muted)}
tr.dr{border-bottom:1px solid var(--border);transition:background .1s;cursor:pointer}
tr.dr:last-child{border-bottom:none}
tr.dr:hover{background:#fafafa}
tr.dr.open{background:var(--accent-bg)}
td{padding:8px 11px;vertical-align:middle}

/* Badges */
.b{display:inline-flex;align-items:center;font-family:'DM Mono',monospace;font-size:9px;padding:1px 5px;border-radius:4px;font-weight:500;white-space:nowrap}
.be{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bd)}
.bp{background:rgba(160,160,170,.1);color:var(--muted);border:1px solid var(--border)}
.bm{background:var(--surface2);color:var(--muted);border:1px solid var(--border)}

/* Numbers */
.n{font-family:'DM Mono',monospace;font-size:12px}
td.r{text-align:right}
.gn{color:var(--green)}.an{color:var(--accent)}.bn{color:var(--blue)}
.ok{color:var(--green);font-weight:600}.hi{color:var(--amber);font-weight:600}.cr{color:var(--red);font-weight:600}.dv{color:var(--dim)}
.eb{background:var(--red-bg);border:1px solid var(--red-bd);border-radius:8px;padding:11px 15px;color:var(--red);font-size:13px;margin-bottom:14px}
.te{padding:60px;text-align:center;color:var(--muted);font-size:13px}
.sp{display:inline-block;width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Pagination */
.pg{display:flex;align-items:center;justify-content:space-between;padding:11px 16px;border-top:1px solid var(--border);gap:12px}
.pg-right{display:flex;align-items:center;gap:12px}
.per-page-sel{height:26px;border:1px solid var(--border);border-radius:5px;background:var(--surface2);color:var(--muted);font-size:12px;font-family:'DM Mono',monospace;padding:0 6px;cursor:pointer;outline:none}
.pi{font-size:12px;color:var(--muted);font-family:'DM Mono',monospace}
.pb{display:flex;gap:4px}
.pbb{height:28px;min-width:28px;padding:0 8px;border-radius:5px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:12px;cursor:pointer;font-family:'DM Mono',monospace;transition:all .15s}
.pbb:hover{background:var(--surface2)}.pbb.on{background:var(--accent);border-color:var(--accent);color:#fff}
.pbb:disabled{opacity:.4;cursor:not-allowed}
.sa{opacity:.3;margin-left:2px}
thead th.s .sa{opacity:1;color:var(--accent)}
.th-wrap{display:flex;align-items:center;gap:3px;justify-content:flex-end;position:relative}
.th-wrap.left{justify-content:flex-start}
.th-fi{width:16px;height:16px;display:flex;align-items:center;justify-content:center;border-radius:3px;cursor:pointer;color:var(--dim);flex-shrink:0}
.th-fi:hover,.th-fi.on{color:var(--accent);background:var(--accent-bg)}
.th-sort{cursor:pointer;white-space:nowrap}
.npop{position:absolute;top:calc(100% + 4px);right:0;z-index:9999;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px;min-width:180px;box-shadow:0 4px 20px rgba(0,0,0,.12);display:none}
.npop.op{display:block}
.npop-title{font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:8px}
.npop-row{display:flex;gap:6px;margin-bottom:6px;align-items:center}
.npop-op{height:28px;border:1px solid var(--border);border-radius:5px;background:var(--surface2);color:var(--text);font-size:12px;padding:0 6px;outline:none;flex-shrink:0}
.npop-v{height:28px;border:1px solid var(--border);border-radius:5px;background:var(--surface2);color:var(--text);font-size:12px;padding:0 7px;outline:none;flex:1;min-width:0}
.npop-acts{display:flex;gap:6px;margin-top:8px}
.npop-apply{height:26px;padding:0 10px;border-radius:5px;border:none;background:var(--accent);color:#fff;font-size:11px;font-weight:500;cursor:pointer}
.npop-apply:hover{background:#a83d10}
.npop-clear{height:26px;padding:0 10px;border-radius:5px;border:1px solid var(--border);background:var(--surface);color:var(--muted);font-size:11px;cursor:pointer}
.npop-clear:hover{background:var(--surface2)}
.th-sort{cursor:pointer;display:flex;align-items:center;gap:2px;flex:1;min-width:0}
.th-sort.left{justify-content:flex-start}

/* Thumbnail */
.thumb{width:32px;height:32px;border-radius:4px;object-fit:cover;border:1px solid var(--border);background:var(--surface2)}
.thumb-ph{width:32px;height:32px;border-radius:4px;background:var(--surface2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;color:var(--dim);font-size:11px}

/* ASIN cell */
.asin-cell{display:flex;flex-direction:column;gap:2px}
.asin-code{font-family:'DM Mono',monospace;font-size:12px;font-weight:500}
.asin-title{font-size:11px;color:var(--muted);max-width:260px;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}

/* Detail row */
tr.detail-row td{padding:0;border-bottom:1px solid var(--border)}
.detail-panel{padding:20px 24px;background:#fafbfc;display:grid;grid-template-columns:1fr 360px;gap:24px;align-items:start}
.detail-chart-wrap{position:relative;height:220px}
.detail-camp-table{font-size:12px}
.detail-camp-table table{font-size:12px}
.detail-camp-table thead th{font-size:9px;padding:6px 8px}
.detail-camp-table td{padding:6px 8px}
.detail-section-title{font-family:'DM Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:10px}
.period-btn{padding:2px 8px;font-size:11px;border:1px solid var(--border);border-radius:3px;background:transparent;color:var(--muted);cursor:pointer}
.period-btn.active-period{background:var(--accent);color:#fff;border-color:var(--accent)}
.detail-loading{padding:40px;text-align:center;color:var(--muted);font-size:12px}
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-dot">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/></svg>
    </div>
    Amazon Ads Automation
  </div>
  <nav>
    <a href="/">Главная</a>
    <a href="/analytics/campaigns">Кампании</a>
    <a href="/search-terms">Запросы</a>
    <a href="/sales-comparison" class="active">Продажи</a>
  </nav>
</header>

<main>

<div id="err-bar" class="eb" style="display:none"></div>

<!-- Filters -->
<div class="fp">
  <div class="fr">
    <!-- Account type -->
    <div class="fg">
      <span class="fl">Аккаунт</span>
      <div class="at">
        <button class="atb on" onclick="setAcct('MERCH')">MERCH</button>
        <button class="atb" onclick="setAcct('KDP')">KDP</button>
      </div>
    </div>

    <!-- Dates -->
    <div class="fg">
      <span class="fl">От</span>
      <input type="date" id="date-from" oninput="S.dateFrom=this.value;S.page=1;load()">
    </div>
    <div class="fg">
      <span class="fl">До</span>
      <input type="date" id="date-to" oninput="S.dateTo=this.value;S.page=1;load()">
    </div>

    <!-- Marketplace -->
    <div class="fg">
      <span class="fl">Маркетплейс</span>
      <div class="at" id="mkt-btns">
        <button class="atb on" onclick="setMkt('US')">US</button>
        <button class="atb" onclick="setMkt('DE')">DE</button>
        <button class="atb" onclick="setMkt('UK')">UK</button>
        <button class="atb" onclick="setMkt('FR')">FR</button>
        <button class="atb" onclick="setMkt('ES')">ES</button>
        <button class="atb" onclick="setMkt('IT')">IT</button>
      </div>
    </div>

    <!-- Portfolio (MERCH only) -->
    <div class="fg" id="portfolio-wrap">
      <span class="fl">Портфолио</span>
      <div class="pdw">
        <div class="pdt" id="pf-trigger" onclick="togglePfDrop()">
          <span id="pf-label">Все</span>
        </div>
        <span class="pda">▾</span>
        <div class="pdd" id="pf-drop">
          <input class="pds" placeholder="Поиск..." oninput="filterPfItems(this.value)">
          <div id="pf-items"><div class="pd-empty">Загрузка...</div></div>
        </div>
      </div>
    </div>

    <!-- Name search -->
    <div class="fg">
      <span class="fl">Поиск</span>
      <input type="text" id="name-inp" placeholder="ASIN или название..." style="min-width:200px"
             oninput="S.name=this.value;S.page=1;debounceLoad()">
    </div>

    <!-- Per page -->
    <div class="fg" style="margin-left:auto">
      <span class="fl">На странице</span>
      <select class="per-page-sel" style="height:34px" onchange="S.perPage=+this.value;S.page=1;load()">
        <option value="25">25</option>
        <option value="50" selected>50</option>
        <option value="100">100</option>
        <option value="200">200</option>
      </select>
    </div>
  </div>

  <!-- Mode rows -->
  <div class="mode-row">
    <span class="mode-lbl">Тип</span>
    <div class="ptdw">
      <div class="pdt" id="pt-trigger" onclick="togglePtDrop()">
        <span id="pt-trigger-lbl">Все типы</span>
        <svg class="pda" width="12" height="12" viewBox="0 0 12 12"><path d="M2 4l4 4 4-4" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round"/></svg>
      </div>
      <div class="pdd" id="pt-drop">
        <input class="pds" id="pt-search" placeholder="Поиск..." oninput="renderPtItems(this.value)">
        <div id="pt-list"></div>
      </div>
    </div>
    <div class="sep"></div>
    <span class="mode-lbl">Реклама</span>
    <div class="at">
      <button class="mbt on" onclick="setAdFilter('')">Все</button>
      <button class="mbt" onclick="setAdFilter('advertised')">Только рекламируемые</button>
      <button class="mbt" onclick="setAdFilter('organic')">Только органика</button>
    </div>
  </div>
</div>

<!-- Summary bar -->
<div class="sr" id="summary-bar">
  <div class="sc"><div class="sl">Товаров</div><div class="sv" id="s-total">—</div></div>
  <div class="sc"><div class="sl">Роялти</div><div class="sv g" id="s-royalties">—</div></div>
  <div class="sc"><div class="sl">Продажи всего</div><div class="sv g" id="s-total-rev">—</div></div>
  <div class="sc"><div class="sl">Расходы на рекламу</div><div class="sv a" id="s-spend">—</div></div>
  <div class="sc"><div class="sl">Продажи рекл.</div><div class="sv b" id="s-attr">—</div></div>
  <div class="sc"><div class="sl">Клики</div><div class="sv" id="s-clicks">—</div></div>
  <div class="sc"><div class="sl">TACoS</div><div class="sv" id="s-tacos">—</div></div>
</div>

<!-- Table -->
<div class="tw">
  <div class="thr">
    <span class="tt">Сравнение продаж</span>
    <span class="tc" id="tbl-count">—</span>
  </div>
  <div class="tsx">
    <table>
      <thead>
        <tr>
          <th class="ns" style="width:42px">Фото</th>
          <th onclick="sortBy('asin')" id="th-asin" style="width:110px">ASIN <span class="sa">↕</span></th>
          <th class="ns">Название</th>
          <th class="ns">Тип</th>
          <th id="th-royalties"></th>
          <th id="th-total_revenue"></th>
          <th id="th-ad_sales"></th>
          <th id="th-total_units"></th>
          <th id="th-ad_orders"></th>
          <th id="th-ad_spend"></th>
          <th id="th-ad_share_pct"></th>
          <th id="th-tacos"></th>
          <th id="th-acos"></th>
          <th id="th-clicks"></th>
          <th id="th-cpc"></th>
        </tr>
      </thead>
      <tbody id="tbl-body">
        <tr><td colspan="15" class="te">Загрузка...</td></tr>
      </tbody>
    </table>
  </div>
  <div class="pg" id="pagination"></div>
</div>

</main>

<script>
// Values must match product_type field in earnings table (case-insensitive LIKE)
const MERCH_TYPES = [
  {label:'Standard t-shirt',          val:'Standard t-shirt'},
  {label:'Pullover hoodie',            val:'Pullover hoodie'},
  {label:'Long sleeve t-shirt',        val:'Long sleeve t-shirt'},
  {label:'Sweatshirt',                 val:'Sweatshirt'},
  {label:'Tank top',                   val:'Tank top'},
  {label:'V-neck t-shirt',             val:'V-neck t-shirt'},
  {label:'Zip hoodie',                 val:'Zip hoodie'},
  {label:'PopSockets',                 val:'PopSockets'},
  {label:'iPhone cases',               val:'iPhone cases'},
  {label:'Premium t-shirt',            val:'Premium t-shirt'},
  {label:'Performance t-shirt',        val:'Performance t-shirt'},
  {label:'Baseball hat',               val:'Baseball hat'},
  {label:'Trucker hat',                val:'Trucker hat'},
  {label:'Crop top',                   val:'Crop top'},
  {label:'Raglan',                     val:'Raglan'},
  {label:'Tote bag',                   val:'Tote bag'},
  {label:'Throw pillow',               val:'Throw pillow'},
  {label:'Fleece jacket',              val:'Fleece jacket'},
  {label:'Youth t-shirt',              val:'Youth t-shirt'},
];
const KDP_TYPES = [
  {label:'Paperback',  val:'Standard - Paperback'},
  {label:'Hardcover',  val:'Standard - Hardcover'},
];

const S = {
  acct: 'MERCH', mkt: 'US', dateFrom: '', dateTo: '',
  portfolios: [], name: '', productTypes: new Set(), adFilter: '',
  sortBy: 'ad_spend', sortDir: 'desc', page: 1, perPage: 50,
  numFilters: {}, chartPeriod: 'week'
};

let openAsin = null;
let openMkt  = null;
let openTr   = null;
let weekChart = null;
let pfPortfolios = [];
let pfSelected = new Set();
let debTimer = null;

function debounceLoad() {
  clearTimeout(debTimer);
  debTimer = setTimeout(load, 350);
}

// ── Account / Marketplace / Filters ──────────────────────────────────────────

function setAcct(v) {
  S.acct = v;
  S.page = 1;
  S.portfolios = [];
  pfSelected.clear();
  updatePfLabel();
  document.querySelectorAll('[onclick^="setAcct"]').forEach(b => b.classList.toggle('on', b.textContent === v));
  document.getElementById('portfolio-wrap').style.display = v === 'MERCH' ? '' : 'none';
  renderPtButtons();
  if (v === 'MERCH') loadPortfolios();
  load();
}

function setMkt(v) {
  S.mkt = v;
  S.page = 1;
  document.querySelectorAll('#mkt-btns .atb').forEach(b => b.classList.toggle('on', b.textContent === v));
  if (S.acct === 'MERCH') filterPortfolios();
  load();
}

function setAdFilter(v) {
  S.adFilter = v;
  S.page = 1;
  document.querySelectorAll('.mode-row .mbt').forEach(b => {
    const map = {'': 'Все', 'advertised': 'Только рекламируемые', 'organic': 'Только органика'};
    b.classList.toggle('on', map[v] === b.textContent);
  });
  load();
}

let ptAllTypes = [];

function renderPtButtons() {
  ptAllTypes = S.acct === 'MERCH' ? MERCH_TYPES : KDP_TYPES;
  S.productTypes = new Set();
  updatePtLabel();
  renderPtItems('');
}

function updatePtLabel() {
  const lbl = document.getElementById('pt-trigger-lbl');
  if (!lbl) return;
  if (S.productTypes.size === 0) lbl.textContent = 'Все типы';
  else if (S.productTypes.size === 1) lbl.textContent = [...S.productTypes][0];
  else lbl.textContent = `Выбрано: ${S.productTypes.size}`;
}

function renderPtItems(q) {
  const list = document.getElementById('pt-list');
  if (!list) return;
  const filtered = q ? ptAllTypes.filter(t => t.label.toLowerCase().includes(q.toLowerCase())) : ptAllTypes;
  if (!filtered.length) { list.innerHTML = '<div class="pd-empty">Нет вариантов</div>'; return; }
  list.innerHTML = filtered.map(t => {
    const chk = S.productTypes.has(t.val) ? 'checked' : '';
    return `<label class="pdi"><input type="checkbox" ${chk} onchange="togglePt('${esc(t.val)}',this.checked)"><span>${t.label}</span></label>`;
  }).join('');
}

function togglePt(val, checked) {
  if (checked) S.productTypes.add(val);
  else S.productTypes.delete(val);
  S.page = 1;
  updatePtLabel();
  load();
}

function togglePtDrop() {
  const drop = document.getElementById('pt-drop');
  const trig = document.getElementById('pt-trigger');
  const open = drop.classList.toggle('on');
  trig.classList.toggle('on', open);
  if (open) { document.getElementById('pt-search').value = ''; renderPtItems(''); document.getElementById('pt-search').focus(); }
  if (open) document.addEventListener('click', closePtOutside, {once: true, capture: true});
}

function closePtOutside(e) {
  const wrap = document.querySelector('.ptdw');
  if (wrap && !wrap.contains(e.target)) {
    document.getElementById('pt-drop').classList.remove('on');
    document.getElementById('pt-trigger').classList.remove('on');
  } else if (wrap && wrap.contains(e.target)) {
    document.addEventListener('click', closePtOutside, {once: true, capture: true});
  }
}

// ── Portfolio dropdown ────────────────────────────────────────────────────────

function togglePfDrop() {
  const drop = document.getElementById('pf-drop');
  const trig = document.getElementById('pf-trigger');
  const open = drop.classList.toggle('on');
  trig.classList.toggle('on', open);
  if (open) drop.querySelector('input').focus();
  if (open) document.addEventListener('click', closePfOutside, {once: true, capture: true});
}

function closePfOutside(e) {
  const wrap = document.querySelector('.pdw');
  if (!wrap.contains(e.target)) {
    document.getElementById('pf-drop').classList.remove('on');
    document.getElementById('pf-trigger').classList.remove('on');
  } else {
    document.addEventListener('click', closePfOutside, {once: true, capture: true});
  }
}

function filterPfItems(q) {
  const items = document.querySelectorAll('#pf-items .pdi');
  items.forEach(it => {
    it.style.display = it.querySelector('span').textContent.toLowerCase().includes(q.toLowerCase()) ? '' : 'none';
  });
}

function renderPfItems() {
  const wrap = document.getElementById('pf-items');
  if (!pfPortfolios.length) { wrap.innerHTML = '<div class="pd-empty">Нет данных</div>'; return; }
  wrap.innerHTML = pfPortfolios.map(p => `
    <label class="pdi">
      <input type="checkbox" value="${p.portfolio_id}" ${pfSelected.has(p.portfolio_id) ? 'checked' : ''}
             onchange="togglePf('${p.portfolio_id}')">
      <span>${p.portfolio_name || p.portfolio_id}</span>
    </label>`).join('');
}

function togglePf(id) {
  if (pfSelected.has(id)) pfSelected.delete(id); else pfSelected.add(id);
  updatePfLabel();
  S.portfolios = [...pfSelected];
  S.page = 1;
  load();
}

function updatePfLabel() {
  document.getElementById('pf-label').textContent =
    pfSelected.size === 0 ? 'Все' : `Выбрано: ${pfSelected.size}`;
}

let _allPortfolios = [];

async function loadPortfolios() {
  try {
    if (!_allPortfolios.length) {
      const r = await fetch('/portfolios/list');
      const d = await r.json();
      _allPortfolios = d.portfolios || [];
    }
    filterPortfolios();
  } catch(e) {}
}

function filterPortfolios() {
  pfPortfolios = _allPortfolios.filter(p =>
    p.account_type === S.acct && p.marketplace === S.mkt
  );
  // drop selected that no longer match
  pfSelected = new Set([...pfSelected].filter(id => pfPortfolios.some(p => p.portfolio_id === id)));
  S.portfolios = [...pfSelected];
  renderPfItems();
}

// ── Formatting helpers ────────────────────────────────────────────────────────

function fmtMoney(v) {
  if (v == null) return '—';
  return '$' + Number(v).toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
}

function fmtNum(v) {
  if (v == null) return '—';
  return Number(v).toLocaleString('en-US');
}

function fmtPct(v) {
  if (v == null) return '—';
  return v.toFixed(1) + '%';
}

function tacosColor(v) {
  if (v == null) return 'dv';
  if (v < 15)  return 'ok';
  if (v < 35)  return 'hi';
  return 'cr';
}

function acosColor(v) {
  if (v == null) return 'dv';
  if (v < 15)  return 'ok';
  if (v < 35)  return 'hi';
  return 'cr';
}

function adShareColor(v) {
  if (v == null) return 'dv';
  if (v < 30)  return 'ok';
  if (v < 60)  return 'hi';
  return 'cr';
}

function stateBadge(s) {
  if (!s) return '';
  const cls = s === 'ENABLED' ? 'be' : 'bp';
  return `<span class="b ${cls}">${s}</span>`;
}

// ── Sorting ───────────────────────────────────────────────────────────────────

function sortBy(field) {
  if (S.sortBy === field) {
    S.sortDir = S.sortDir === 'desc' ? 'asc' : 'desc';
  } else {
    S.sortBy  = field;
    S.sortDir = 'desc';
  }
  S.page = 1;
  updateSortHeaders();
  load();
}

function updateSortHeaders() {
  const SORTABLE = ['asin','total_sales','ad_sales','total_units','ad_orders','ad_spend','ad_share_pct','tacos','acos','clicks','cpc'];
  SORTABLE.forEach(f => {
    const th = document.getElementById('th-' + f);
    if (!th) return;
    const arrow = f === S.sortBy ? (S.sortDir === 'desc' ? ' ↓' : ' ↑') : ' ↕';
    th.classList.toggle('s', f === S.sortBy);
    th.innerHTML = th.textContent.replace(/\s[↕↓↑]$/, '') + ` <span class="sa">${arrow.trim()}</span>`;
  });
}

// ── Numeric filter helpers ────────────────────────────────────────────────────
function thNum(col, label) {
  const isAct = S.sortBy === col;
  const nf = S.numFilters[col] || {};
  const hasFilter = (nf.op && nf.val !== '') || nf.min || nf.max;
  const arr = isAct ? (S.sortDir === 'asc' ? '↑' : '↓') : '';
  document.getElementById('th-' + col).outerHTML = `<th id="th-${col}" class="${isAct?'s':''}"><div class="th-wrap"><div class="th-sort" onclick="sortBy('${col}')">${label} <span class="sa">${arr}</span></div><div class="th-fi ${hasFilter?'on':''}" data-fi="${col}" onclick="openNumPop('${col}',this)"><svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg></div><div class="npop" id="np_${col}"><div class="npop-title">${label}</div><div class="npop-row"><select class="npop-op" id="nop_${col}"><option value="">—</option><option value="gt">&gt;</option><option value="gte">&ge;</option><option value="lt">&lt;</option><option value="lte">&le;</option><option value="eq">=</option></select><input class="npop-v" id="nval_${col}" type="number" placeholder="Значение"></div><div class="npop-row"><input class="npop-v" id="nmin_${col}" type="number" placeholder="Мин"><input class="npop-v" id="nmax_${col}" type="number" placeholder="Макс"></div><div class="npop-acts"><button class="npop-apply" onclick="applyNumFilter('${col}')">Применить</button><button class="npop-clear" onclick="clearNumFilter('${col}')">Сбросить</button></div></div></div></th>`;
}

function renderNumHeaders() {
  thNum('royalties',    'Роялти');
  thNum('total_revenue','Продажи всего');
  thNum('ad_sales',     'Продажи рекл.');
  thNum('total_units',  'Заказы всего');
  thNum('ad_orders',    'Заказы рекл.');
  thNum('ad_spend',     'Расходы');
  thNum('ad_share_pct', 'Доля рекл. %');
  thNum('tacos',        'TACoS %');
  thNum('acos',         'ACoS %');
  thNum('clicks',       'Клики');
  thNum('cpc',          'CPC');
}

function openNumPop(col, el) {
  document.querySelectorAll('.npop').forEach(p => p.classList.remove('op'));
  const p = document.getElementById('np_' + col);
  if (p) { p.classList.add('op'); el.classList.add('on'); }
}

function applyNumFilter(col) {
  const op  = document.getElementById('nop_'  + col)?.value || '';
  const val = document.getElementById('nval_' + col)?.value || '';
  const mn  = document.getElementById('nmin_' + col)?.value || '';
  const mx  = document.getElementById('nmax_' + col)?.value || '';
  S.numFilters[col] = {op, val, min: mn, max: mx};
  document.querySelectorAll('.npop').forEach(p => p.classList.remove('op'));
  load(1);
}

function clearNumFilter(col) {
  S.numFilters[col] = {op:'', val:'', min:'', max:''};
  ['nop_','nval_','nmin_','nmax_'].forEach(pfx => {
    const el = document.getElementById(pfx + col); if (el) el.value = '';
  });
  document.querySelectorAll('.npop').forEach(p => p.classList.remove('op'));
  load(1);
}

document.addEventListener('click', e => {
  if (!e.target.closest('.th-wrap')) document.querySelectorAll('.npop').forEach(p => p.classList.remove('op'));
});

// ── Main load ─────────────────────────────────────────────────────────────────

async function load() {
  collapseDetail();
  const params = new URLSearchParams({
    account_type: S.acct,
    marketplace: S.mkt,
    date_from: S.dateFrom,
    date_to: S.dateTo,
    name: S.name,
    product_types: [...S.productTypes].join(','),
    ad_filter: S.adFilter,
    portfolio_ids: S.portfolios.join(','),
    sort_by: S.sortBy,
    sort_dir: S.sortDir,
    page: S.page,
    per_page: S.perPage,
  });
  for (const [k, v] of Object.entries(S.numFilters)) {
    if (v.op && v.val !== '') { params.set(k + '_op', v.op); params.set(k + '_val', v.val); }
    if (v.min !== '') params.set(k + '_min', v.min);
    if (v.max !== '') params.set(k + '_max', v.max);
  }

  renderNumHeaders();
  document.getElementById('tbl-body').innerHTML = '<tr><td colspan="15" class="te"><span class="sp"></span></td></tr>';
  document.getElementById('err-bar').style.display = 'none';

  try {
    const r   = await fetch('/sales-comparison/data?' + params);
    const d   = await r.json();
    if (d.error) { showErr(d.error); return; }
    renderRows(d.rows);
    renderSummary(d.summary, d.total);
    renderPagination(d.total, d.page, d.per_page);
    document.getElementById('tbl-count').textContent = `${fmtNum(d.total)} записей`;
  } catch(e) {
    showErr(e.message);
  }
}

function showErr(msg) {
  const bar = document.getElementById('err-bar');
  bar.textContent = 'Ошибка: ' + msg;
  bar.style.display = '';
  document.getElementById('tbl-body').innerHTML = '<tr><td colspan="15" class="te">Ошибка загрузки</td></tr>';
}

// ── Render rows ───────────────────────────────────────────────────────────────

function renderRows(rows) {
  const tbody = document.getElementById('tbl-body');
  if (!rows.length) {
    tbody.innerHTML = '<tr><td colspan="15" class="te">Нет данных</td></tr>';
    return;
  }
  tbody.innerHTML = rows.map((r, i) => {
    const thumb = (S.acct === 'MERCH' && r.image_url)
      ? `<img class="thumb" src="${r.image_url}" loading="lazy" onerror="this.style.display='none'">`
      : `<div class="thumb-ph">—</div>`;

    const ptBadge = r.product_type ? `<span class="b bm">${r.product_type}</span>` : '—';

    const displayAsin = r.primary_asin || r.asin;
    return `<tr class="dr" data-asin="${esc(displayAsin)}" data-mkt="${esc(r.marketplace)}" data-idx="${i}" onclick="toggleDetail('${esc(displayAsin)}','${esc(r.marketplace)}',this)">
      <td>${thumb}</td>
      <td class="n" style="font-size:12px;white-space:nowrap">${esc(displayAsin || '—')}</td>
      <td style="max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:12px" title="${esc(r.title || '')}">${esc(r.title || '—')}</td>
      <td>${ptBadge}</td>
      <td class="r n gn">${fmtMoney(r.royalties)}</td>
      <td class="r n gn">${fmtMoney(r.total_revenue)}</td>
      <td class="r n bn">${fmtMoney(r.ad_sales)}</td>
      <td class="r n">${fmtNum(r.total_units)}</td>
      <td class="r n">${fmtNum(r.ad_orders)}</td>
      <td class="r n an">${fmtMoney(r.ad_spend)}</td>
      <td class="r n ${adShareColor(r.ad_share_pct)}">${fmtPct(r.ad_share_pct)}</td>
      <td class="r n ${tacosColor(r.tacos)}">${fmtPct(r.tacos)}</td>
      <td class="r n ${acosColor(r.acos)}">${fmtPct(r.acos)}</td>
      <td class="r n">${fmtNum(r.clicks)}</td>
      <td class="r n">${r.cpc != null ? fmtMoney(r.cpc) : '—'}</td>
    </tr>`;
  }).join('');
}

function esc(s) {
  if (s == null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Summary bar ───────────────────────────────────────────────────────────────

function renderSummary(sum, total) {
  document.getElementById('s-total').textContent     = fmtNum(total);
  document.getElementById('s-royalties').textContent = fmtMoney(sum.sum_royalties);
  document.getElementById('s-total-rev').textContent = fmtMoney(sum.sum_total_revenue);
  document.getElementById('s-spend').textContent     = fmtMoney(sum.sum_spend);
  document.getElementById('s-attr').textContent      = fmtMoney(sum.sum_ad_sales);
  document.getElementById('s-clicks').textContent    = fmtNum(sum.sum_clicks);
  const tacos = sum.sum_total_revenue > 0 ? (sum.sum_royalties / sum.sum_total_revenue * 100) : null;
  const tacoEl = document.getElementById('s-tacos');
  tacoEl.textContent = tacos != null ? tacos.toFixed(1) + '%' : '—';
  tacoEl.className = 'sv ' + tacosColor(tacos);
}

// ── Pagination ────────────────────────────────────────────────────────────────

function renderPagination(total, page, perPage) {
  const pages = Math.ceil(total / perPage);
  const pg = document.getElementById('pagination');
  if (pages <= 1) { pg.innerHTML = ''; return; }

  let btns = '';
  const lo = Math.max(1, page - 2);
  const hi = Math.min(pages, page + 2);
  if (lo > 1) btns += `<button class="pbb" onclick="goPage(1)">1</button>`;
  if (lo > 2) btns += `<button class="pbb" disabled>…</button>`;
  for (let p = lo; p <= hi; p++) {
    btns += `<button class="pbb ${p === page ? 'on' : ''}" onclick="goPage(${p})">${p}</button>`;
  }
  if (hi < pages - 1) btns += `<button class="pbb" disabled>…</button>`;
  if (hi < pages) btns += `<button class="pbb" onclick="goPage(${pages})">${pages}</button>`;

  const from = (page - 1) * perPage + 1;
  const to   = Math.min(page * perPage, total);
  pg.innerHTML = `
    <span class="pi">${from}–${to} из ${fmtNum(total)}</span>
    <div class="pg-right">
      <div class="pb">
        <button class="pbb" onclick="goPage(${page-1})" ${page===1?'disabled':''}>‹</button>
        ${btns}
        <button class="pbb" onclick="goPage(${page+1})" ${page===pages?'disabled':''}>›</button>
      </div>
    </div>`;
}

function goPage(p) {
  S.page = p;
  load();
}

// ── Detail row (inline expand) ────────────────────────────────────────────────

function collapseDetail() {
  if (openTr) {
    openTr.classList.remove('open');
    const next = openTr.nextSibling;
    if (next && next.classList && next.classList.contains('detail-row')) next.remove();
    openTr  = null;
    openAsin = null;
    openMkt  = null;
  }
  if (weekChart) { weekChart.destroy(); weekChart = null; }
}

function toggleDetail(asin, mkt, tr) {
  if (openAsin === asin && openMkt === mkt) {
    collapseDetail();
    return;
  }
  collapseDetail();

  openAsin = asin;
  openMkt  = mkt;
  openTr   = tr;
  tr.classList.add('open');

  // Insert detail row
  const detailTr = document.createElement('tr');
  detailTr.className = 'detail-row';
  detailTr.innerHTML = `<td colspan="15">
    <div style="padding:16px">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
        <div class="detail-section-title" style="margin-bottom:0">Тренд</div>
        <div id="period-toggle" style="display:flex;gap:2px">
          <button onclick="setPeriod('week')" id="btn-week" class="period-btn active-period">Неделя</button>
          <button onclick="setPeriod('month')" id="btn-month" class="period-btn">Месяц</button>
        </div>
      </div>
      <div class="detail-chart-wrap" style="height:220px"><canvas id="week-chart"></canvas></div>
      <div class="detail-section-title" style="margin-top:16px">Кампании</div>
      <div id="camp-wrap" class="detail-camp-table"><div class="detail-loading"><span class="sp"></span></div></div>
    </div>
  </td>`;
  tr.parentNode.insertBefore(detailTr, tr.nextSibling);

  // Fetch in parallel
  const params = new URLSearchParams({
    account_type: S.acct, asin, marketplace: mkt,
    date_from: S.dateFrom, date_to: S.dateTo, period: S.chartPeriod
  });

  Promise.all([
    fetch('/sales-comparison/weekly?' + params).then(r => r.json()),
    fetch('/sales-comparison/campaigns?' + params).then(r => r.json()),
  ]).then(([wd, cd]) => {
    renderWeekChart(wd.weeks || []);
    renderCampTable(cd.campaigns || []);
  }).catch(e => {
    document.getElementById('camp-wrap').innerHTML = `<div style="color:var(--red);font-size:12px;padding:10px">Ошибка: ${e.message}</div>`;
  });
}

function setPeriod(p) {
  S.chartPeriod = p;
  document.getElementById('btn-week').classList.toggle('active-period', p === 'week');
  document.getElementById('btn-month').classList.toggle('active-period', p === 'month');
  if (!openAsin) return;
  // Re-fetch chart only
  const params = new URLSearchParams({
    account_type: S.acct, asin: openAsin, marketplace: openMkt,
    date_from: S.dateFrom, date_to: S.dateTo, period: S.chartPeriod
  });
  fetch('/sales-comparison/weekly?' + params).then(r => r.json()).then(wd => renderWeekChart(wd.weeks || []));
}

// ── Weekly chart ──────────────────────────────────────────────────────────────

function renderWeekChart(weeks) {
  if (weekChart) { weekChart.destroy(); weekChart = null; }
  const canvas = document.getElementById('week-chart');
  if (!canvas || !weeks.length) return;

  const labels      = weeks.map(w => w.week ? w.week.slice(0,10) : '');
  const adUnits     = weeks.map(w => w.ad_units      || 0);
  const orgUnits    = weeks.map(w => w.organic_units  || 0);
  const spend       = weeks.map(w => w.ad_spend       || 0);
  const royalties   = weeks.map(w => w.royalties      || 0);

  weekChart = new Chart(canvas, {
    data: {
      labels,
      datasets: [
        {
          type: 'bar',
          label: 'Органические заказы',
          data: orgUnits,
          backgroundColor: 'rgba(26,143,92,0.5)',
          borderColor: 'rgba(26,143,92,0.8)',
          borderWidth: 1,
          stack: 'units',
          yAxisID: 'y',
        },
        {
          type: 'bar',
          label: 'Рекламные заказы',
          data: adUnits,
          backgroundColor: 'rgba(26,111,212,0.5)',
          borderColor: 'rgba(26,111,212,0.8)',
          borderWidth: 1,
          stack: 'units',
          yAxisID: 'y',
        },
        {
          type: 'line',
          label: 'Расходы на рекламу',
          data: spend,
          borderColor: 'rgba(200,75,20,0.9)',
          backgroundColor: 'rgba(200,75,20,0.1)',
          borderWidth: 2,
          pointRadius: 3,
          tension: 0.3,
          yAxisID: 'y2',
          fill: false,
        },
        {
          type: 'line',
          label: 'Роялти',
          data: royalties,
          borderColor: 'rgba(26,143,92,0.9)',
          backgroundColor: 'transparent',
          borderWidth: 2,
          pointRadius: 3,
          tension: 0.3,
          yAxisID: 'y2',
          fill: false,
        },
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { labels: { font: { size: 11 }, boxWidth: 12 } },
        tooltip: {
          callbacks: {
            label: ctx => {
              const v = ctx.parsed.y;
              if (ctx.dataset.yAxisID === 'y2') return `${ctx.dataset.label}: $${v.toFixed(2)}`;
              return `${ctx.dataset.label}: ${Math.round(v)}`;
            }
          }
        }
      },
      scales: {
        x: { ticks: { font: { size: 10 }, maxRotation: 45 } },
        y: {
          stacked: true,
          position: 'left',
          title: { display: true, text: 'Заказы', font: { size: 10 } },
          ticks: { font: { size: 10 }, stepSize: 1 },
        },
        y2: {
          stacked: false,
          position: 'right',
          grid: { drawOnChartArea: false },
          title: { display: true, text: '$', font: { size: 10 } },
          ticks: { font: { size: 10 }, callback: v => '$' + v },
        }
      }
    }
  });
}

// ── Campaign table ────────────────────────────────────────────────────────────

function renderCampTable(camps) {
  const wrap = document.getElementById('camp-wrap');
  if (!camps.length) { wrap.innerHTML = '<div style="color:var(--muted);font-size:12px;padding:10px">Нет данных</div>'; return; }
  wrap.innerHTML = `<table>
    <thead><tr>
      <th style="text-align:left">Кампания</th>
      <th>Статус</th>
      <th>Клики</th>
      <th>Расходы</th>
      <th>Атриб.</th>
      <th>ACoS</th>
    </tr></thead>
    <tbody>
    ${camps.map(c => `<tr class="dr">
      <td style="max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${esc(c.campaign_name)}">${esc(c.campaign_name)}</td>
      <td>${stateBadge(c.campaign_state)}</td>
      <td class="r n">${fmtNum(c.clicks)}</td>
      <td class="r n an">${fmtMoney(c.ad_spend)}</td>
      <td class="r n bn">${fmtMoney(c.ad_sales)}</td>
      <td class="r n ${acosColor(c.acos)}">${fmtPct(c.acos)}</td>
    </tr>`).join('')}
    </tbody>
  </table>`;
}

// ── Init ──────────────────────────────────────────────────────────────────────

function init() {
  // Default dates: last 30 days
  const today = new Date();
  const from  = new Date(today);
  from.setDate(today.getDate() - 30);
  const fmt = d => d.toISOString().slice(0,10);
  S.dateFrom = fmt(from);
  S.dateTo   = fmt(today);
  document.getElementById('date-from').value = S.dateFrom;
  document.getElementById('date-to').value   = S.dateTo;

  renderPtButtons();
  loadPortfolios();
  load();

  document.addEventListener('click', e => {
    if (!e.target.closest('.pdw')) {
      document.getElementById('pf-drop').classList.remove('on');
      document.getElementById('pf-trigger').classList.remove('on');
    }
  });
}

init();
</script>
</body>
</html>
